<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gracias por tu visita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; font-family: Arial, sans-serif; background: #f0f4f8; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: white; border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.10); padding: 52px 40px 44px; text-align: center; width: 100%; max-width: 380px; }
    .stars { font-size: 44px; letter-spacing: 4px; margin-bottom: 24px; display: block; }
    h2 { color: #1A4A8A; font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    .subtitle { color: #777; font-size: 15px; line-height: 1.6; margin-bottom: 36px; }
    .btn { display: block; background: #1A4A8A; color: white; text-decoration: none; padding: 18px 24px; border-radius: 14px; font-size: 17px; font-weight: 700; }
    .chofer-tag { display: inline-block; margin-top: 22px; font-size: 13px; color: #bbb; background: #f5f5f5; padding: 4px 14px; border-radius: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="stars">⭐⭐⭐⭐⭐</span>
    <h2>¡Gracias por elegirnos!</h2>
    <p class="subtitle">Tu opinión nos ayuda a seguir mejorando.<br>Solo toma 30 segundos.</p>
    <a class="btn" href="https://g.page/r/CbceeiBsa_EGEBM/review" target="_top">
      Dejar mi reseña en Google
    </a>
    <span class="chofer-tag">Atendido por: Sergi</span>
  </div>

  </script>
</body>
</html>
